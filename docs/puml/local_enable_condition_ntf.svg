Lib</text><rect fill="#FEFECE" filter="url(#f12lz3bwho6c4m)" height="30.2969" style="stroke: #A80036; stroke-width: 1.5;" width="66" x="687.5" y="889.2969"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacingAndGlyphs" textLength="52" x="694.5" y="909.292">FaultLib</text><rect fill="#FEFECE" filter="url(#f12lz3bwho6c4m)" height="46.5938" style="stroke: #A80036; stroke-width: 1.5;" width="151" x="949" y="58.0859"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacingAndGlyphs" textLength="69" x="990" y="78.0811">IpcWorker</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacingAndGlyphs" textLength="137" x="956" y="94.3779">(fault_client_worker)</text><rect fill="#FEFECE" filter="url(#f12lz3bwho6c4m)" height="46.5938" style="stroke: #A80036; stroke-width: 1.5;" width="151" x="949" y="889.2969"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacingAndGlyphs" textLength="69" x="990" y="909.292">IpcWorker</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacingAndGlyphs" textLength="137" x="956" y="925.5889">(fault_client_worker)</text><rect fill="#FEFECE" filter="url(#f12lz3bwho6c4m)" height="30.2969" style="stroke: #A80036; stroke-width: 1.5;" width="104" x="1154" y="74.3828"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacingAndGlyphs" textLength="90" x="1161" y="94.3779">DiagFaultMgr</text><rect fill="#FEFECE" filter="url(#f12lz3bwho6c4m)" height="30.2969" style="stroke: #A80036; stroke-width: 1.5;" width="104" x="1154" y="889.2969"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacingAndGlyphs" textLength="90" x="1161" y="909.292">DiagFaultMgr</text><a href="new_enable_condition.svg New Enable Condition" target="_top" title="new_enable_condition.svg New Enable Condition" xlink:actuate="onRequest" xlink:href="new_enable_condition.svg New Enable Condition"