Request" xlink:href="[&quot;Timeout" xlink:show="new" xlink:title="[&quot;Timeout" xlink:type="simple"><text fill="#0000FF" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacingAndGlyphs" text-decoration="underline" textLength="145" x="18" y="747.0386">(DFM not responding)"</text></a><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="5" x="163" y="747.0386">]</text><polygon fill="#A80036" points="76.5,767.7656,66.5,771.7656,76.5,775.7656,72.5,771.7656" style="stroke: #A80036; stroke-width: 1.0;"/><line style="stroke: #A80036; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="70.5" x2="308.5" y1="771.7656" y2="771.7656"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="148" x="82.5" y="766.6997">Err(CatalogVerification)</text><!--MD5=[2208d5488a47b6990beacbbebd42ed68]
@startuml
title Fault Catalog Initialization

skinparam ParticipantPadding 20

box "App Process"
participant App order 1
create FaultLib order 2
App -> FaultLib : FaultApi::try_new(catalog)
participant "IpcWorker\n(fault_client_worker)" as IpcWorker order 3
end box

box "DFM Process"
participant DiagnosticFaultMgr order 4
end box

FaultLib -> FaultLib : read_and_verify_catalog_config_file()
FaultLib -> FaultLib : calculate_catalog_hashsum()

create IpcWorker
FaultLib -> IpcWorker : spawn thread + create\niceoryx2 publisher ("dfm/event") +\nEC notification subscriber
FaultLib -> FaultLib : create iceoryx2 subscriber\n("dfm/event/hash/response")

== Hash Verification (iceoryx2 zero-copy shared memory) ==

FaultLib ->> IpcWorker : mpsc::try_send(\nDiagnosticEvent::Hash(catalog_id, hash))
IpcWorker ->> DiagnosticFaultMgr : iceoryx2 publish on "dfm/event"

DiagnosticFaultMgr -> DiagnosticFaultMgr : check_hash_sum(path, hash)
DiagnosticFaultMgr ->> FaultLib : iceoryx2 publish bool\non "dfm/event/hash/response"
note right of FaultLib
    FaultLib polls subscriber directly
    (not via IpcWorker) every 50ms,
    timeout 500ms.
end note

alt [["Response received within 500ms"]]
    FaultLib -> FaultLib : FaultCatalogOk()
    App <- - FaultLib : Ok(FaultApi)
else [["Timeout (DFM not responding)"]]
    App <- - FaultLib : Err(CatalogVerification)
end


@enduml

