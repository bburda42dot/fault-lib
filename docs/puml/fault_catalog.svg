: 1.0;"/><line style="stroke: #A80036; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="70.5" x2="308.5" y1="841.1641" y2="841.1641"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="148" x="82.5" y="836.0981">Err(CatalogVerification)</text><!--MD5=[ae80a2f836f9fe13bfccdeaa6b399dc4]
@startuml
title Fault Catalog Initialization

skinparam ParticipantPadding 20

box "App Process"
participant App order 1
create FaultLib order 2
App -> FaultLib : FaultApi::try_new(catalog)
participant "IpcWorker\n(fault_client_worker)" as IpcWorker order 3
end box

box "DFM Process"
participant DiagnosticFaultMgr order 4
end box

FaultLib -> FaultLib : read_and_verify_catalog_config_file()
FaultLib -> FaultLib : calculate_catalog_hashsum()

create IpcWorker
FaultLib -> IpcWorker : spawn thread + create\npublisher ("dfm/event") +\nEC notification subscriber
FaultLib -> FaultLib : create subscriber\n("dfm/event/hash/response")
note right of IpcWorker
    IPC transport is pluggable via **FaultSinkApi** trait
    (reporter side) and **DfmTransport** trait (DFM side).
    Default implementation: iceoryx2 zero-copy shared memory.
end note

== Hash Verification (IPC - default: iceoryx2) ==

FaultLib ->> IpcWorker : mpsc::try_send(\nDiagnosticEvent::Hash(catalog_id, hash))
IpcWorker ->> DiagnosticFaultMgr : publish on "dfm/event"

DiagnosticFaultMgr -> DiagnosticFaultMgr : check_hash_sum(path, hash)
DiagnosticFaultMgr ->> FaultLib : publish bool\non "dfm/event/hash/response"
note right of FaultLib
    FaultLib polls subscriber directly
    (not via IpcWorker) every 50ms,
    timeout 500ms.
end note

alt [["Response received within 500ms"]]
    FaultLib -> FaultLib : FaultCatalogOk()
    App <- - FaultLib : Ok(FaultApi)
else [["Timeout (DFM not responding)"]]
    App <- - FaultLib : Err(CatalogVerification)
end


@enduml

