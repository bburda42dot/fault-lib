t><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="98" x="525.5" y="764.6997">(entity, Active))</text><line style="stroke: #A80036; stroke-width: 1.0;" x1="1057" x2="1047" y1="814.0313" y2="810.0313"/><line style="stroke: #A80036; stroke-width: 1.0;" x1="1057" x2="1047" y1="814.0313" y2="818.0313"/><line style="stroke: #A80036; stroke-width: 1.0;" x1="877.5" x2="1058" y1="814.0313" y2="814.0313"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="102" x="884.5" y="793.8325">iceoryx2 publish</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="95" x="884.5" y="808.9653">on "dfm/event"</text><polygon fill="#A80036" points="1256,839.1641,1266,843.1641,1256,847.1641,1260,843.1641" style="stroke: #A80036; stroke-width: 1.0;"/><line style="stroke: #A80036; stroke-width: 1.0;" x1="1059" x2="1262" y1="843.1641" y2="843.1641"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="185" x="1066" y="838.0981">update_status(entity, Active)</text><!--MD5=[33bdc89927127d7aaafad251fa13e445]
@startuml
title Registering new enabling condition by the provider
skinparam ParticipantPadding 20

box "App Process"
participant App
participant EnablingCondition
participant FaultLib
participant "IpcWorker\n(fault_client_worker)" as IpcWorker
end box
box "DFM Process"
participant DiagFaultMgr
participant EnablingConditionRegistry
end box

== Registration ==

App -> FaultLib : FaultApi::get_enabling_condition(sovd_entity)
FaultLib -> FaultLib : EnablingConditionManager.check_if_exist(sovd_entity)

alt ["EnablingCondition already registered or entity too long"]
    App <- - FaultLib : Err(AlreadyRegistered | EntityTooLong)
else
    FaultLib -> FaultLib : store condition (status = Inactive)
    create EnablingCondition
    EnablingCondition <- FaultLib : new(id, manager)
    FaultLib ->> IpcWorker : mpsc::try_send(\nEnablingConditionRegister\n(sovd_entity))
    IpcWorker ->> DiagFaultMgr : iceoryx2 publish\non "dfm/event"
    DiagFaultMgr -> EnablingConditionRegistry : register(sovd_entity)
    App <- - FaultLib : Ok(EnablingCondition)
end

== Reporting Condition Change ==

App -> EnablingCondition : report_status(Active)
EnablingCondition -> FaultLib : EnablingConditionManager.report_status()
FaultLib -> FaultLib : update local state + notify local monitors
App <- - EnablingCondition : Ok(())
FaultLib ->> IpcWorker : mpsc::try_send(\nEnablingConditionStatusChange\n(entity, Active))
IpcWorker ->> DiagFaultMgr : iceoryx2 publish\non "dfm/event"
DiagFaultMgr -> EnablingConditionRegistry : update_status(entity, Active)

@enduml

